<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    input, button {
      font-size: 16px;
      padding: 10px 12px;
    }
    input {
      width: 220px;
    }
    button {
      cursor: pointer;
      margin-left: 8px;
    }
    select {
      font-size: 16px;
      padding: 10px 12px;
    }
    input[type="number"] {
      font-size: 16px;
      padding: 8px 10px;
      width: 80px;
      margin-left: 8px;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      width: fit-content;
    }
    #board {
      display: inline-block;
      border: 2px solid #333;
      background: #f0d9b5;
      width: fit-content;
    }
    #board table {
      border-collapse: collapse;
    }
    #board td {
      width: 40px;
      height: 40px;
      text-align: center;
      font-size: 30px;
      border: 1px solid #333;
    }
    #board .white {
      background: #f0d9b5;
    }
    #board .coord {
      background: #ddd;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      border: 1px solid #333;
      width: 40px;
      height: 40px;
    }
    .row {
      margin: 16px 0;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .fen {
      word-break: break-all;
      background: #f3f3f3;
      padding: 10px;
      border-radius: 6px;
    }
    ul {
      padding-left: 18px;
    }
    .input-label {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
      display: block;
    }
    .move-inputs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .move-row {
      display: flex;
      align-items: center;
      gap: 0;
    }
  </style>

  <style>
    @media (max-width: 600px) {
      body {
        font-size: 14px;
        margin: 16px auto;
        padding: 0 8px;
      }
      input, button, select {
        font-size: 14px;
        padding: 8px 10px;
      }
      input {
        width: 160px;
      }
      input[type="number"] {
        width: 60px;
      }
      #fenInput {
        width: 200px;
      }
      pre {
        padding: 12px;
      }
      #board td {
        width: 30px;
        height: 30px;
        font-size: 24px;
      }
      #board .coord {
        font-size: 16px;
        background: #fff;
        color: #000;
        width: 30px;
        height: 30px;
      }
      .row {
        margin: 12px 0;
      }
    }
  </style>
</head>
<body>
  <p>Inserisci mosse in formato UCI (es. <code>e2e4</code>, <code>g1f3</code>) oppure in notazione SAN italiana (es. <code>e4</code>, <code>Cf3</code>, <code>0-0</code>).</p>

  <div class="row">
    <div class="move-inputs">
      <div>
        <span class="input-label">Mossa UCI (es. e2e4, g1f3, e7e8q)</span>
        <div class="move-row">
          <input id="moveInput" placeholder="es. e2e4" autocapitalize="off" />
          <button id="moveBtn">Applica mossa</button>
        </div>
      </div>
      <div>
        <span class="input-label">Mossa SAN italiana &mdash; R=Re, D=Donna, T=Torre, A=Alfiere, C=Cavallo (es. e4, Cf3, Axe5, 0-0)</span>
        <div class="move-row">
          <input id="sanInput" placeholder="es. e4, Cf3, 0-0" autocapitalize="off" />
          <button id="sanMoveBtn">Applica mossa SAN</button>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <button id="engineMoveBtn">Mossa motore</button>
  </div>

  <div id="message" class="row"></div>

  <div class="row">
    <strong>Scacchiera:</strong> <button id="toggleBoard">Mostra</button>
    <div id="board" style="display: none;"></div>
  </div>

  <div class="row">
    <strong>FEN corrente:</strong> <button id="toggleFen">Mostra</button>
    <div id="fen" class="fen" style="display: none;"></div>
  </div>

  <div class="row">
    <strong>Cronologia:</strong> <button id="toggleHistory">Mostra</button>
    <ul id="history" style="display: none;"></ul>
  </div>

  <div class="row">
    <button id="resetBtn">Reset partita</button>
    <input id="fenInput" placeholder="Inserisci FEN per caricare partita" style="width: 400px;" />
    <button id="loadFenBtn">Carica FEN</button>
  </div>

  <div class="row">
    <label for="voiceSelect"><strong>Voce</strong></label><br />
    <select id="voiceSelect"></select>
    <button id="testVoiceBtn">Test Voce</button>
    <button id="toggleVoiceBtn">Disabilita voce</button>
  </div>

  <div class="row">
    <strong>Impostazioni motore:</strong> <button id="toggleSettings">Mostra</button>
    <div id="settings" style="display: none;">
      <label for="depthInput">Profondità (1-18):</label>
      <input type="number" id="depthInput" min="1" max="18" value="10" />
      <br />
      <label for="timeInput">Tempo max (ms, max 100):</label>
      <input type="number" id="timeInput" min="1" max="100" value="50" />
    </div>
  </div>

  <script type="module">
    import { PartitaScacchi } from './PartitaScacchi.js';

    const partita = new PartitaScacchi();

    const fenEl = document.getElementById('fen');
    const boardEl = document.getElementById('board');
    const moveInput = document.getElementById('moveInput');
    const moveBtn = document.getElementById('moveBtn');
    const engineMoveBtn = document.getElementById('engineMoveBtn');
    const sanInput = document.getElementById('sanInput');
    const sanMoveBtn = document.getElementById('sanMoveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const fenInput = document.getElementById('fenInput');
    const loadFenBtn = document.getElementById('loadFenBtn');
    const historyEl = document.getElementById('history');
    const messageEl = document.getElementById('message');

    const toggleBoardBtn = document.getElementById('toggleBoard');
    const toggleHistoryBtn = document.getElementById('toggleHistory');
    const toggleFenBtn = document.getElementById('toggleFen');
    const voiceSelect = document.getElementById('voiceSelect');
    const testVoiceBtn = document.getElementById('testVoiceBtn');
    const toggleSettingsBtn = document.getElementById('toggleSettings');
    const settingsEl = document.getElementById('settings');
    const toggleVoiceBtn = document.getElementById('toggleVoiceBtn');

    const synth = window.speechSynthesis;
    let voices = [];
    let voiceEnabled = true;

    // ----------------------------------------------------------------
    // Mappatura SAN italiana -> SAN inglese (lettera pezzo)
    // R=Re(K), D=Donna(Q), T=Torre(R), A=Alfiere(B), C=Cavallo(N)
    // Accetta anche le lettere inglesi per compatibilità
    // ----------------------------------------------------------------
    const ITA_TO_ENG_PIECE = { R: 'K', D: 'Q', T: 'R', A: 'B', C: 'N' };
    // Promozione italiana -> inglese
    const ITA_TO_ENG_PROMO = { R: 'K', D: 'Q', T: 'R', A: 'B', C: 'N',
                                K: 'K', Q: 'Q', B: 'B', N: 'N' };
    // Tutte le lettere di pezzo ammesse (italiane + inglesi)
    const ALL_PIECE_LETTERS = 'RDTACKQBN';

    // ----------------------------------------------------------------
    // Parser SAN italiano → UCI
    // ----------------------------------------------------------------
    function sanToUci(san) {
      const board = partita.board;
      const activeColor = partita.activeColor;
      const isWhite = activeColor === 'w';

      // Rimuovi annotazioni di scacco / scaccomatto e spazi
      const cleaned = san.replace(/[+#!?]/g, '').trim();

      // Arrocco (sia con O che con 0)
      if (cleaned === 'O-O-O' || cleaned === '0-0-0') {
        return isWhite ? 'e1c1' : 'e8c8';
      }
      if (cleaned === 'O-O' || cleaned === '0-0') {
        return isWhite ? 'e1g1' : 'e8g8';
      }

      // Regex SAN: accetta lettere di pezzo italiane E inglesi
      // Gruppo 1: lettera pezzo (opzionale) — RDTACKQBN
      // Gruppo 2: disambiguazione file (opzionale) — [a-h]
      // Gruppo 3: disambiguazione rank (opzionale) — [1-8]
      // Gruppo 4: cattura (opzionale) — x
      // Gruppo 5: destinazione — [a-h][1-8]
      // Gruppo 6: promozione (opzionale) — =[RDTACKQBN]
      const sanRegex = new RegExp(
        `^([${ALL_PIECE_LETTERS}])?([a-h])?([1-8])?(x)?([a-h][1-8])(=[${ALL_PIECE_LETTERS}])?$`
      );
      const match = cleaned.match(sanRegex);

      if (!match) {
        throw new Error(`Notazione SAN non riconosciuta: "${san}"`);
      }

      const [, rawPieceLetter, disambFile, disambRank, , destination, promotionStr] = match;

      // Converti lettera pezzo italiana in inglese
      let engPieceLetter = null;
      if (rawPieceLetter) {
        engPieceLetter = ITA_TO_ENG_PIECE[rawPieceLetter] ?? rawPieceLetter;
      }

      // Gestione promozione: converti lettera italiana in inglese
      let promotion = null;
      if (promotionStr) {
        const rawPromo = promotionStr[1]; // es. "=D" -> "D"
        const engPromo = ITA_TO_ENG_PROMO[rawPromo] ?? rawPromo;
        // Per la promozione UCI si usa la lettera inglese minuscola (escluso re)
        // Pezzi validi per promozione: D/Q, T/R, A/B, C/N
        if (!['Q','R','B','N'].includes(engPromo)) {
          throw new Error(`Promozione non valida: "${rawPromo}". Usa D, T, A o C.`);
        }
        promotion = engPromo.toLowerCase();
      }

      // Determina il carattere pezzo sulla scacchiera (case-sensitive: bianco=maiusc, nero=minusc)
      let pieceChar;
      if (!engPieceLetter) {
        // Nessuna lettera = pedone
        pieceChar = isWhite ? 'P' : 'p';
      } else {
        pieceChar = isWhite ? engPieceLetter.toUpperCase() : engPieceLetter.toLowerCase();
      }

      // Cerca tutti i pezzi del tipo corretto sulla scacchiera
      const candidates = [];
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          if (board[r][c] !== pieceChar) continue;
          const fromSquare = String.fromCharCode(97 + c) + String(8 - r);

          // Applica filtri disambiguazione
          if (disambFile && c !== (disambFile.charCodeAt(0) - 97)) continue;
          if (disambRank && r !== (8 - parseInt(disambRank))) continue;

          // Verifica se la mossa è legalmente valida tramite il motore interno
          try {
            partita.validateBasicMove(board[r][c], fromSquare, destination, partita.enPassant);
            candidates.push({ fromSquare, toSquare: destination });
          } catch {
            // mossa non valida per questo pezzo, salta
          }
        }
      }

      if (candidates.length === 0) {
        throw new Error(`Nessun pezzo può eseguire la mossa: "${san}"`);
      }
      if (candidates.length > 1) {
        throw new Error(`Mossa ambigua (più pezzi possibili): "${san}". Aggiungi una disambiguazione (es. C1f3, Tae1).`);
      }

      const { fromSquare, toSquare } = candidates[0];
      return fromSquare + toSquare + (promotion || '');
    }
    // ----------------------------------------------------------------

    function render() {
      fenEl.textContent = partita.getFen();
      boardEl.innerHTML = partita.renderBoardHTML();
      historyEl.innerHTML = '';

      partita.history.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.move} → ${item.fen}`;
        historyEl.appendChild(li);
      });
    }

    function setMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.className = isError ? 'row error' : 'row';
    }

    function loadVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = '';

      const italianVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('it'));
      const usable = italianVoices.length ? italianVoices : voices;

      let googleVoiceIndex = -1;

      usable.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
        
        if (voice.name.toLowerCase().includes('google')) {
          googleVoiceIndex = index;
        }
      });

      if (googleVoiceIndex !== -1) {
        voiceSelect.value = googleVoiceIndex;
      }
    }

    function speak(text) {
      if (!voiceEnabled) return;
      if (!('speechSynthesis' in window)) return;

      synth.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'it-IT';
      utterance.rate = 1;
      utterance.pitch = 1;
      utterance.volume = 1;

      const italianVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('it'));
      const usable = italianVoices.length ? italianVoices : voices;
      const selected = usable[Number(voiceSelect.value)];

      if (selected) {
        utterance.voice = selected;
        utterance.lang = selected.lang;
      }

      synth.speak(utterance);
    }

    function coordToItalian(square) {
      const cols = { a: 'a', b: 'bi', c: 'ci', d: 'di', e: 'e', f: 'effe', g: 'gi', h: 'acca' };
      const rows = { '1': 'uno', '2': 'due', '3': 'tre', '4': 'quattro', '5': 'cinque', '6': 'sei', '7': 'sette', '8': 'otto' };
      return `${cols[square[0]]} ${rows[square[1]]}`;
    }

    function speakMoveUci(move) {
      if (!move) return;

      const pieceNames = { K: 're', Q: 'donna', R: 'torre', B: 'alfiere', N: 'cavallo' };
      const files = { a: 'a', b: 'bi', c: 'ci', d: 'di', e: 'e', f: 'effe', g: 'gi', h: 'acca' };
      const ranks = { '1': 'uno', '2': 'due', '3': 'tre', '4': 'quattro', '5': 'cinque', '6': 'sei', '7': 'sette', '8': 'otto' };

      let sanMove = move.replace(/[+#]$/, '');

      const promotionRegex = /=([QRBN])$/;
      const promotionMatch = sanMove.match(promotionRegex);
      let promotionPiece = null;
      if (promotionMatch) {
        promotionPiece = promotionMatch[1];
        sanMove = sanMove.replace(promotionMatch[0], '');
      }

      const isCapture = sanMove.includes('x');
      sanMove = sanMove.replace('x', '');

      let piece = null;
      let disambiguation = '';
      let destination = '';

      if (sanMove.length === 2 && /^[a-h][1-8]$/.test(sanMove)) {
        piece = 'pedone';
        destination = sanMove;
      } else if (sanMove.match(/^[KQRBN]/)) {
        const pieceLetter = sanMove[0];
        piece = pieceNames[pieceLetter];
        sanMove = sanMove.substring(1);
        const remaining = sanMove;
        if (remaining.length === 2) {
          destination = remaining;
        } else if (remaining.length === 3) {
          disambiguation = remaining[0];
          destination = remaining.substring(1);
        }
      }

      if (!destination) return;

      const destFile = destination[0];
      const destRank = destination[1];
      const destFileIt = files[destFile];
      const destRankIt = ranks[destRank];

      let text = '';
      if (isCapture) {
        text = `${piece} per ${destFileIt} ${destRankIt}`;
      } else if (disambiguation) {
        const disambIt = /^[a-h]$/.test(disambiguation) ? files[disambiguation] : ranks[disambiguation];
        text = `${piece} ${disambIt} ${destFileIt} ${destRankIt}`;
      } else {
        text = `${piece} ${destFileIt} ${destRankIt}`;
      }

      if (promotionPiece) {
        const promotionName = pieceNames[promotionPiece];
        text += ` promozione a ${promotionName}`;
      }

      speak(text);
    }

    async function applyMove(uci) {
      partita.makeMove(uci);
      await partita.makeStockfishMove();
      const sanMove = partita.lastMove || partita.history[partita.history.length - 1]?.move;
      speakMoveUci(sanMove);
      setMessage(`Ultima mossa del motore: ${sanMove}`, false);
      moveInput.value = '';
      sanInput.value = '';
      render();
    }

    // ----------------------------------------------------------------
    // Bottone UCI
    // ----------------------------------------------------------------
    moveBtn.addEventListener('click', async () => {
      const uci = moveInput.value.trim();
      try {
        await applyMove(uci);
        moveInput.focus();
      } catch (err) {
        setMessage(err.message, true);
      }
    });

    moveInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') moveBtn.click();
    });

    // ----------------------------------------------------------------
    // Bottone SAN italiano
    // ----------------------------------------------------------------
    sanMoveBtn.addEventListener('click', async () => {
      const san = sanInput.value.trim();
      if (!san) return;
      try {
        const uci = sanToUci(san);
        await applyMove(uci);
        sanInput.focus();
      } catch (err) {
        setMessage(err.message, true);
      }
    });

    sanInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sanMoveBtn.click();
    });
    // ----------------------------------------------------------------

    engineMoveBtn.addEventListener('click', async () => {
      try {
        await partita.makeStockfishMove();
        const sanMove = partita.lastMove || partita.history[partita.history.length - 1]?.move;
        speakMoveUci(sanMove);
        sanInput.focus();
        setMessage(`Mossa del motore: ${sanMove}`, false);
        render();
        sanInput.focus();
      } catch (err) {
        setMessage(err.message, true);
      }
    });

    resetBtn.addEventListener('click', () => {
      partita.reset();
      fenInput.value = '';
      setMessage('Partita resettata.', false);
      render();
    });

    loadFenBtn.addEventListener('click', () => {
      const fen = fenInput.value.trim();
      try {
        partita.loadFromFen(fen);
        setMessage('Partita caricata da FEN.', false);
        render();
      } catch (err) {
        setMessage(err.message, true);
      }
    });

    toggleBoardBtn.addEventListener('click', () => {
      if (boardEl.style.display === 'none') {
        boardEl.style.display = 'block';
        toggleBoardBtn.textContent = 'Nascondi';
      } else {
        boardEl.style.display = 'none';
        toggleBoardBtn.textContent = 'Mostra';
      }
    });

    toggleHistoryBtn.addEventListener('click', () => {
      if (historyEl.style.display === 'none') {
        historyEl.style.display = 'block';
        toggleHistoryBtn.textContent = 'Nascondi';
      } else {
        historyEl.style.display = 'none';
        toggleHistoryBtn.textContent = 'Mostra';
      }
    });

    toggleFenBtn.addEventListener('click', () => {
      if (fenEl.style.display === 'none') {
        fenEl.style.display = 'block';
        toggleFenBtn.textContent = 'Nascondi';
      } else {
        fenEl.style.display = 'none';
        toggleFenBtn.textContent = 'Mostra';
      }
    });

    testVoiceBtn.addEventListener('click', () => {
      speak('Test della voce');
    });

    toggleVoiceBtn.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      toggleVoiceBtn.textContent = voiceEnabled ? 'Disabilita voce' : 'Abilita voce';
      setMessage(voiceEnabled ? 'Voce abilitata.' : 'Voce disabilitata.', false);
    });

    toggleSettingsBtn.addEventListener('click', () => {
      if (settingsEl.style.display === 'none') {
        settingsEl.style.display = 'block';
        toggleSettingsBtn.textContent = 'Nascondi';
      } else {
        settingsEl.style.display = 'none';
        toggleSettingsBtn.textContent = 'Mostra';
      }
    });

    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    render();
  </script>
</body>
</html>
