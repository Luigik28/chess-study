<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess FEN Tester</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    input, button {
      font-size: 16px;
      padding: 10px 12px;
    }
    input {
      width: 220px;
    }
    button {
      cursor: pointer;
      margin-left: 8px;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .row {
      margin: 16px 0;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .fen {
      word-break: break-all;
      background: #f3f3f3;
      padding: 10px;
      border-radius: 6px;
    }
    ul {
      padding-left: 18px;
    }
  </style>
</head>
<body>
  <h1>Chess FEN Tester</h1>

  <p>Inserisci mosse in formato UCI, ad esempio: <code>e2e4</code>, <code>g1f3</code>, <code>e7e8q</code>.</p>

  <div class="row">
    <button id="resetBtn">Reset partita</button>
  </div>

  <div class="row">
    <strong>FEN corrente:</strong>
    <div id="fen" class="fen"></div>
  </div>

  <div class="row">
    <strong>Scacchiera:</strong>
    <pre id="board"></pre>
  </div>

  <div class="row">
    <input id="moveInput" placeholder="es. e2e4" />
    <button id="moveBtn">Applica mossa</button>
  </div>

  <div id="message" class="row"></div>

  <div class="row">
    <strong>Cronologia:</strong>
    <ul id="history"></ul>
  </div>

  <script type="module">
    import { PartitaScacchi } from './PartitaScacchi.js';

    const partita = new PartitaScacchi();

    const fenEl = document.getElementById('fen');
    const boardEl = document.getElementById('board');
    const moveInput = document.getElementById('moveInput');
    const moveBtn = document.getElementById('moveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const historyEl = document.getElementById('history');
    const messageEl = document.getElementById('message');

    function render() {
      fenEl.textContent = partita.getFen();
      boardEl.textContent = partita.renderBoardAscii();
      historyEl.innerHTML = '';

      partita.history.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.move} → ${item.fen}`;
        historyEl.appendChild(li);
      });
    }

    function setMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.className = isError ? 'row error' : 'row';
    }

    moveBtn.addEventListener('click', () => {
      const move = moveInput.value.trim();

      try {
        const newFen = partita.makeMove(move);
        setMessage(`Mossa applicata. Nuova FEN: ${newFen}`, false);
        moveInput.value = '';
        render();
      } catch (err) {
        setMessage(err.message, true);
      }
    });

    moveInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') moveBtn.click();
    });

    resetBtn.addEventListener('click', () => {
      partita.reset();
      setMessage('Partita resettata.', false);
      render();
    });

    render();
  </script>
</body>
</html>
