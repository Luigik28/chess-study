<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    input, button {
      font-size: 16px;
      padding: 10px 12px;
    }
    input {
      width: 220px;
    }
    button {
      cursor: pointer;
      margin-left: 8px;
    }
    select {
      font-size: 16px;
      padding: 10px 12px;
    }
    input[type="number"] {
      font-size: 16px;
      padding: 8px 10px;
      width: 80px;
      margin-left: 8px;
    }
    pre {
      background: #111;
      color: #eee;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      width: fit-content;
    }
    #board {
      display: inline-block;
      border: 2px solid #333;
      background: #f0d9b5;
      width: fit-content;
    }
    #board table {
      border-collapse: collapse;
    }
    #board td {
      width: 40px;
      height: 40px;
      text-align: center;
      font-size: 30px;
      border: 1px solid #333;
    }
    #board .white {
      background: #f0d9b5;
    }
    #board .black {
      background: #b58863;
    }
    .row {
      margin: 16px 0;
    }
    .error {
      color: #b00020;
      font-weight: bold;
    }
    .fen {
      word-break: break-all;
      background: #f3f3f3;
      padding: 10px;
      border-radius: 6px;
    }
    ul {
      padding-left: 18px;
    }
  </style>

  <style>
    @media (max-width: 600px) {
      body {
        font-size: 14px;
        margin: 16px auto;
        padding: 0 8px;
      }
      input, button, select {
        font-size: 14px;
        padding: 8px 10px;
      }
      input {
        width: 160px;
      }
      input[type="number"] {
        width: 60px;
      }
      pre {
        padding: 12px;
      }
      #board td {
        width: 30px;
        height: 30px;
        font-size: 24px;
      }
      .row {
        margin: 12px 0;
      }
    }
  </style>
</head>
<body>
  <h1>Chess</h1>

  <p>Inserisci mosse in formato UCI, ad esempio: <code>e2e4</code>, <code>g1f3</code>, <code>e7e8q</code>.</p>

  <div class="row">
    <input id="moveInput" placeholder="es. e2e4" autocapitalize="off" />
    <button id="moveBtn">Applica mossa</button>
  </div>

  <div class="row">
    <button id="resetBtn">Reset partita</button>
  </div>

  <div class="row">
    <strong>Scacchiera:</strong> <button id="toggleBoard">Mostra</button>
    <div id="board" style="display: none;"></div>
  </div>

  <div id="message" class="row"></div>

  <div class="row">
    <strong>FEN corrente:</strong> <button id="toggleFen">Mostra</button>
    <div id="fen" class="fen" style="display: none;"></div>
  </div>

  <div class="row">
    <strong>Cronologia:</strong> <button id="toggleHistory">Mostra</button>
    <ul id="history" style="display: none;"></ul>
  </div>

  <div class="row">
    <label for="voiceSelect"><strong>Voce</strong></label><br />
    <select id="voiceSelect"></select>
    <button id="testVoiceBtn">Test Voce</button>
  </div>

  <div class="row">
    <strong>Impostazioni motore:</strong> <button id="toggleSettings">Mostra</button>
    <div id="settings" style="display: none;">
      <label for="depthInput">Profondità (1-18):</label>
      <input type="number" id="depthInput" min="1" max="18" value="10" />
      <br />
      <label for="timeInput">Tempo max (ms, max 100):</label>
      <input type="number" id="timeInput" min="1" max="100" value="50" />
    </div>
  </div>

  <script type="module">
    import { PartitaScacchi } from './PartitaScacchi.js';

    const partita = new PartitaScacchi();

    const fenEl = document.getElementById('fen');
    const boardEl = document.getElementById('board');
    const moveInput = document.getElementById('moveInput');
    const moveBtn = document.getElementById('moveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const historyEl = document.getElementById('history');
    const messageEl = document.getElementById('message');

    const toggleBoardBtn = document.getElementById('toggleBoard');
    const toggleHistoryBtn = document.getElementById('toggleHistory');
    const toggleFenBtn = document.getElementById('toggleFen');
    const voiceSelect = document.getElementById('voiceSelect');
    const testVoiceBtn = document.getElementById('testVoiceBtn');
    const toggleSettingsBtn = document.getElementById('toggleSettings');
    const settingsEl = document.getElementById('settings');

    const synth = window.speechSynthesis;
    let voices = [];

    function render() {
      fenEl.textContent = partita.getFen();
      boardEl.innerHTML = partita.renderBoardHTML();
      historyEl.innerHTML = '';

      partita.history.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.move} → ${item.fen}`;
        historyEl.appendChild(li);
      });
    }

    function setMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.className = isError ? 'row error' : 'row';
    }

    function loadVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = '';

      const italianVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('it'));
      const usable = italianVoices.length ? italianVoices : voices;

      let googleVoiceIndex = -1;

      usable.forEach((voice, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.appendChild(option);
        
        if (voice.name.toLowerCase().includes('google')) {
          googleVoiceIndex = index;
        }
      });

      if (googleVoiceIndex !== -1) {
        voiceSelect.value = googleVoiceIndex;
      }
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;

      synth.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'it-IT';
      utterance.rate = 1;
      utterance.pitch = 1;
      utterance.volume = 1;

      const italianVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('it'));
      const usable = italianVoices.length ? italianVoices : voices;
      const selected = usable[Number(voiceSelect.value)];

      if (selected) {
        utterance.voice = selected;
        utterance.lang = selected.lang;
      }

      synth.speak(utterance);
    }

    function coordToItalian(square) {
      const cols = { a: 'a', b: 'bi', c: 'ci', d: 'di', e: 'e', f: 'effe', g: 'gi', h: 'acca' };
      const rows = { '1': 'uno', '2': 'due', '3': 'tre', '4': 'quattro', '5': 'cinque', '6': 'sei', '7': 'sette', '8': 'otto' };
      return `${cols[square[0]]} ${rows[square[1]]}`;
    }

    function speakMoveUci(move) {
      if (!/^[a-h][1-8][a-h][1-8][qrbnQRBN]?$/.test(move)) {
        speak(`Il motore ha giocato ${move}`);
        return;
      }

      const from = move.slice(0, 2);
      const to = move.slice(2, 4);
      const promo = move[4] || '';

      const piece = partita.getPiece(to);
      const pieceNames = { p: 'pedone', n: 'cavallo', b: 'alfiere', r: 'torre', q: 'regina', k: 're' };
      const pieceName = pieceNames[piece?.toLowerCase()] || 'pezzo';
      
      let text = `${pieceName} ${to}`;
      if (promo) {
        const names = { q: 'donna', r: 'torre', b: 'alfiere', n: 'cavallo' };
        text = `promozione a ${names[promo.toLowerCase()] || promo} in ${to}`;
      }
      speak(text);
    }

    moveBtn.addEventListener('click', async () => {
      const move = moveInput.value.trim();

      try {
        partita.makeMove(move);
        await partita.makeStockfishMove();
        const lastMove = partita.history[partita.history.length - 1]?.move;
        speakMoveUci(lastMove);
        
        //setMessage(`Mossa applicata. Nuova FEN: ${partita.getFen()}`, false); 
        moveInput.value = '';
        render();
        moveInput.focus();
      } catch (err) {
        setMessage(err.message, true);
      }
    });

    moveInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') moveBtn.click();
    });

    resetBtn.addEventListener('click', () => {
      partita.reset();
      setMessage('Partita resettata.', false);
      render();
    });

    toggleBoardBtn.addEventListener('click', () => {
      if (boardEl.style.display === 'none') {
        boardEl.style.display = 'block';
        toggleBoardBtn.textContent = 'Nascondi';
      } else {
        boardEl.style.display = 'none';
        toggleBoardBtn.textContent = 'Mostra';
      }
    });

    toggleHistoryBtn.addEventListener('click', () => {
      if (historyEl.style.display === 'none') {
        historyEl.style.display = 'block';
        toggleHistoryBtn.textContent = 'Nascondi';
      } else {
        historyEl.style.display = 'none';
        toggleHistoryBtn.textContent = 'Mostra';
      }
    });

    toggleFenBtn.addEventListener('click', () => {
      if (fenEl.style.display === 'none') {
        fenEl.style.display = 'block';
        toggleFenBtn.textContent = 'Nascondi';
      } else {
        fenEl.style.display = 'none';
        toggleFenBtn.textContent = 'Mostra';
      }
    });

    testVoiceBtn.addEventListener('click', () => {
      speak('Test della voce');
    });

    toggleSettingsBtn.addEventListener('click', () => {
      if (settingsEl.style.display === 'none') {
        settingsEl.style.display = 'block';
        toggleSettingsBtn.textContent = 'Nascondi';
      } else {
        settingsEl.style.display = 'none';
        toggleSettingsBtn.textContent = 'Mostra';
      }
    });

    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    render();
  </script>
</body>
</html>
